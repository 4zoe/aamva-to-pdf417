<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AAMVA to PDF417 Generator (Modernized)</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/feather-icons"></script>

  <style>
    /* Custom scrollbar for raw text area */
    textarea::-webkit-scrollbar { width: 8px; }
    textarea::-webkit-scrollbar-track { background: #f1f5f9; }
    textarea::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    textarea::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    
    .tab-active { border-bottom: 2px solid #3b82f6; color: #1d4ed8; font-weight: 600; }
    .tab-inactive { color: #64748b; font-weight: 500; }
    .tab-inactive:hover { color: #3b82f6; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen p-4 md:p-8">

  <div class="max-w-6xl mx-auto bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden">
    
    <div class="bg-blue-600 text-white p-6 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <i data-feather="credit-card" class="w-8 h-8"></i>
        <h1 class="text-2xl font-bold tracking-tight">AAMVA PDF417 Generator</h1>
      </div>
      <button onclick="generateBarcode()" class="bg-white text-blue-600 hover:bg-blue-50 font-semibold py-2 px-4 rounded shadow transition-colors flex items-center gap-2">
        <i data-feather="cpu" class="w-5 h-5"></i>
        Generate Barcode
      </button>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 divide-y lg:divide-y-0 lg:divide-x divide-slate-200">
      
      <div class="col-span-2 flex flex-col h-full">
        <div class="flex border-b border-slate-200 bg-slate-50 px-4 pt-4">
          <button onclick="switchTab('fields')" id="tab-btn-fields" class="tab-active px-4 py-2 transition-colors">Form Fields</button>
          <button onclick="switchTab('aamva')" id="tab-btn-aamva" class="tab-inactive px-4 py-2 transition-colors">Raw AAMVA Text</button>
        </div>

        <div id="tab-fields" class="p-6 overflow-y-auto max-h-[700px]">
          <form id="aamva-form" class="space-y-6">
            
            <div>
              <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3">Document Information</h3>
              <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="flex flex-col"><label class="text-xs font-bold text-slate-600">ID Number (DAQ)</label><input type="text" id="DAQ" class="mt-1 block w-full rounded-md border-slate-300 border p-2 shadow-sm focus:border-blue-500 focus:ring-blue-500 text-sm"></div>
                <div class="flex flex-col"><label class="text-xs font-bold text-slate-600">DD Number (DCF)</label><input type="text" id="DCF" class="mt-1 block w-full rounded-md border-slate-300 border p-2 shadow-sm focus:border-blue-500 focus:ring-blue-500 text-sm"></div>
                <div class="flex flex-col"><label class="text-xs font-bold text-slate-600">Compliance/Real ID (DDA)</label>
                  <select id="DDA" class="mt-1 block w-full rounded-md border-slate-300 border p-2 shadow-sm focus:border-blue-500 focus:ring-blue-500 text-sm">
                    <option value="F">F - Fully Compliant</option>
                    <option value="N">N - Non-Compliant</option>
                    <option value="M">M - Materially Compliant</option>
                  </select>
                </div>
                <div class="flex flex-col"><label class="text-xs font-bold text-slate-600">Issue Date (DBD)</label><input type="text" id="DBD" placeholder="MMDDYYYY" class="mt-1 block w-full rounded-md border-slate-300 border p-2 shadow-sm focus:border-blue-500 focus:ring-blue-500 text-sm"></div>
                <div class="flex flex-col"><label class="text-xs font-bold text-slate-600">Exp Date (DBA)</label><input type="text" id="DBA" placeholder="MMDDYYYY" class="mt-1 block w-full rounded-md border-slate-300 border p-2 shadow-sm focus:border-blue-500 focus:ring-blue-500 text-sm"></div>
              </div>
            </div>

            <hr class="border-slate-200">
            <div>
              <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3">Personal Details</h3>
              <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="flex flex-col"><label class="text-xs font-bold text-slate-600">First Name (DAC)</label><input type="text" id="DAC" class="mt-1 block w-full rounded-md border-slate-300 border p-2 shadow-sm focus:border-blue-500 focus:ring-blue-500 text-sm"></div>
                <div class="flex flex-col"><label class="text-xs font-bold text-slate-600">Middle Name (DAD)</label><input type="text" id="DAD" class="mt-1 block w-full rounded-md border-slate-300 border p-2 shadow-sm focus:border-blue-500 focus:ring-blue-500 text-sm"></div>
                <div class="flex flex-col"><label class="text-xs font-bold text-slate-600">Last Name (DCS)</label><input type="text" id="DCS" class="mt-1 block w-full rounded-md border-slate-300 border p-2 shadow-sm focus:border-blue-500 focus:ring-blue-500 text-sm"></div>
                <div class="flex flex-col"><label class="text-xs font-bold text-slate-600">DOB (DBB)</label><input type="text" id="DBB" placeholder="MMDDYYYY" class="mt-1 block w-full rounded-md border-slate-300 border p-2 shadow-sm focus:border-blue-500 focus:ring-blue-500 text-sm"></div>
                <div class="flex flex-col"><label class="text-xs font-bold text-slate-600">Gender (DBC)</label>
                  <select id="DBC" class="mt-1 block w-full rounded-md border-slate-300 border p-2 shadow-sm focus:border-blue-500 focus:ring-blue-500 text-sm">
                    <option value="1">1 - Male</option>
                    <option value="2">2 - Female</option>
                    <option value="X">X - Non-Binary</option>
                  </select>
                </div>
                <div class="flex flex-col"><label class="text-xs font-bold text-slate-600">Height (DAU)</label><input type="text" id="DAU" placeholder="069 in" class="mt-1 block w-full rounded-md border-slate-300 border p-2 shadow-sm focus:border-blue-500 focus:ring-blue-500 text-sm"></div>
                <div class="flex flex-col"><label class="text-xs font-bold text-slate-600">Eye Color (DAY)</label><input type="text" id="DAY" placeholder="BLU, BRN, etc." class="mt-1 block w-full rounded-md border-slate-300 border p-2 shadow-sm focus:border-blue-500 focus:ring-blue-500 text-sm"></div>
              </div>
            </div>

            <hr class="border-slate-200">
            <div>
              <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3">Address</h3>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="flex flex-col md:col-span-2"><label class="text-xs font-bold text-slate-600">Street (DAG)</label><input type="text" id="DAG" class="mt-1 block w-full rounded-md border-slate-300 border p-2 shadow-sm focus:border-blue-500 focus:ring-blue-500 text-sm"></div>
                <div class="flex flex-col"><label class="text-xs font-bold text-slate-600">City (DAI)</label><input type="text" id="DAI" class="mt-1 block w-full rounded-md border-slate-300 border p-2 shadow-sm focus:border-blue-500 focus:ring-blue-500 text-sm"></div>
                <div class="flex flex-col"><label class="text-xs font-bold text-slate-600">State (DAJ)</label><input type="text" id="DAJ" class="mt-1 block w-full rounded-md border-slate-300 border p-2 shadow-sm focus:border-blue-500 focus:ring-blue-500 text-sm"></div>
                <div class="flex flex-col"><label class="text-xs font-bold text-slate-600">ZIP (DAK)</label><input type="text" id="DAK" placeholder="9 digits" class="mt-1 block w-full rounded-md border-slate-300 border p-2 shadow-sm focus:border-blue-500 focus:ring-blue-500 text-sm"></div>
                <div class="flex flex-col"><label class="text-xs font-bold text-slate-600">Country (DCG)</label><input type="text" id="DCG" value="USA" class="mt-1 block w-full rounded-md border-slate-300 border p-2 shadow-sm focus:border-blue-500 focus:ring-blue-500 text-sm"></div>
              </div>
            </div>

            <hr class="border-slate-200">
            <div>
              <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3">Advanced (Truncation & Custom Flags)</h3>
              <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="flex flex-col"><label class="text-xs font-bold text-slate-600">First Name Trunc (DDF)</label><input type="text" id="DDF" value="N" class="mt-1 block w-full rounded-md border-slate-300 border p-2 shadow-sm text-sm"></div>
                <div class="flex flex-col"><label class="text-xs font-bold text-slate-600">Middle Name Trunc (DDG)</label><input type="text" id="DDG" value="N" class="mt-1 block w-full rounded-md border-slate-300 border p-2 shadow-sm text-sm"></div>
                <div class="flex flex-col"><label class="text-xs font-bold text-slate-600">Last Name Trunc (DDE)</label><input type="text" id="DDE" value="N" class="mt-1 block w-full rounded-md border-slate-300 border p-2 shadow-sm text-sm"></div>
                <div class="flex flex-col"><label class="text-xs font-bold text-slate-600">Audit Info (DCJ)</label><input type="text" id="DCJ" class="mt-1 block w-full rounded-md border-slate-300 border p-2 shadow-sm text-sm"></div>
                <div class="flex flex-col"><label class="text-xs font-bold text-slate-600">Ethnicity/Race (DCL)</label><input type="text" id="DCL" value="U" class="mt-1 block w-full rounded-md border-slate-300 border p-2 shadow-sm text-sm"></div>
              </div>
            </div>

          </form>
        </div>

        <div id="tab-aamva" class="hidden p-6 h-full flex flex-col">
          <label class="text-sm font-semibold text-slate-600 mb-2">Raw AAMVA Output String</label>
          <p class="text-xs text-slate-400 mb-3">Editing this text will automatically update the form fields.</p>
          <textarea id="raw-aamva" class="flex-grow w-full rounded-md border-slate-300 border p-4 shadow-inner font-mono text-sm leading-relaxed focus:border-blue-500 focus:ring-blue-500 bg-slate-50" spellcheck="false"></textarea>
        </div>
      </div>

      <div class="bg-slate-50 p-6 flex flex-col items-center justify-center min-h-[400px]">
        <h3 class="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-6">PDF417 Output</h3>
        
        <div id="barcode-container" class="bg-white p-4 shadow-sm border border-slate-200 rounded flex items-center justify-center w-full min-h-[150px]">
          <canvas id="barcode" class="max-w-full"></canvas>
        </div>

        <button onclick="downloadBarcode()" class="mt-6 text-slate-500 hover:text-blue-600 transition-colors flex items-center gap-2">
          <i data-feather="download" class="w-5 h-5"></i>
          <span>Download Image</span>
        </button>
      </div>

    </div>
  </div>

  <script>
    // Initialize Feather Icons
    feather.replace();

    // The fields to sync between the Form and the Raw Text
    const fieldCodes = [
      'DAQ','DCF','DDA','DBD','DBA','DAC','DAD','DCS','DBB',
      'DBC','DAU','DAY','DAG','DAI','DAJ','DAK','DCG',
      'DDF','DDG','DDE','DCJ','DCL'
    ];

    // Standard AAMVA Header boilerplate (Change as needed for your specific generator)
    const headerPrefix = "@\n\x1E\rANSI 636020100001DL00410284DL";

    const formEl = document.getElementById('aamva-form');
    const rawTextEl = document.getElementById('raw-aamva');

    // Tab Switching Logic
    function switchTab(tab) {
      document.getElementById('tab-fields').classList.toggle('hidden', tab !== 'fields');
      document.getElementById('tab-aamva').classList.toggle('hidden', tab !== 'aamva');
      
      document.getElementById('tab-btn-fields').className = tab === 'fields' ? 'tab-active px-4 py-2 transition-colors' : 'tab-inactive px-4 py-2 transition-colors';
      document.getElementById('tab-btn-aamva').className = tab === 'aamva' ? 'tab-active px-4 py-2 transition-colors' : 'tab-inactive px-4 py-2 transition-colors';
    }

    // 1. Generate Raw AAMVA from Form
    function updateRawFromForm() {
      let rawText = headerPrefix;
      
      fieldCodes.forEach(code => {
        const input = document.getElementById(code);
        if (input && input.value.trim() !== '') {
          rawText += `\n${code}${input.value.trim()}`;
        }
      });
      
      rawTextEl.value = rawText;
    }

    // 2. Populate Form from Raw AAMVA
    function updateFormFromRaw() {
      const rawText = rawTextEl.value;
      const lines = rawText.split('\n');
      
      // Clear current form
      fieldCodes.forEach(code => {
        const input = document.getElementById(code);
        if(input) input.value = '';
      });

      // Parse lines
      lines.forEach(line => {
        const code = line.substring(0, 3);
        const value = line.substring(3);
        
        if (fieldCodes.includes(code)) {
          const input = document.getElementById(code);
          if (input) input.value = value;
        }
      });
    }

    // Event Listeners for 2-way binding
    formEl.addEventListener('input', updateRawFromForm);
    rawTextEl.addEventListener('input', updateFormFromRaw);

    // Initial population with dummy data to show it works
    const dummyData = {
      DAQ: "123456789", DCF: "1234567", DDA: "F", DBD: "01012022",
      DBA: "01012027", DAC: "JOHN", DAD: "Q", DCS: "PUBLIC",
      DBB: "01011990", DBC: "1", DAU: "070 in", DAY: "BRN",
      DAG: "123 MAIN ST", DAI: "DENVER", DAJ: "CO", DAK: "800120000",
      DCG: "USA", DDF: "N", DDG: "N", DDE: "N", DCJ: "CODL_1234", DCL: "U"
    };

    // Pre-fill
    Object.keys(dummyData).forEach(k => {
      const el = document.getElementById(k);
      if(el) el.value = dummyData[k];
    });
    updateRawFromForm();

    // Mock functions for your external libraries
    function generateBarcode() {
      const rawAamva = document.getElementById('raw-aamva').value;
      console.log("Generating barcode with payload:", rawAamva);
      alert("Hook up PDF417.js here! The raw AAMVA text is ready to be encoded.");
      
      // Example implementation hook (requires your old app.js / pdf417.js):
      // PDF417.init(rawAamva);
      // var barcode = PDF417.getBarcodeArray();
      // renderBarcodeOnCanvas(barcode);
    }

    function downloadBarcode() {
      const canvas = document.getElementById('barcode');
      // Create a dummy link and click it to download
      const link = document.createElement('a');
      link.download = 'aamva-barcode.png';
      link.href = canvas.toDataURL("image/png");
      link.click();
    }
  </script>
</body>
</html>
